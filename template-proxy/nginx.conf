events {
    worker_connections 256;
}

http {
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    resolver_timeout 5s;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;

        location = / {
            try_files /import.html =404;
            add_header Cache-Control "no-store" always;
        }

        location = /import.html {
            try_files /import.html =404;
            add_header Cache-Control "no-store" always;
        }

        location /template-snapshots/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://affine.mystoredigital.cloud" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            proxy_pass https://cdn.affine.pro;
            proxy_ssl_server_name on;
            proxy_ssl_name cdn.affine.pro;
            proxy_set_header Host cdn.affine.pro;
            proxy_set_header User-Agent "Affine-SelfHosted-Template-Proxy";
            proxy_set_header Accept-Encoding "";
            proxy_buffering off;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;

            add_header Access-Control-Allow-Origin "https://affine.mystoredigital.cloud" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Type, ETag, Last-Modified" always;
        }

        location / {
            return 404;
        }
    }
}
