services:
  affine_migration:
    image: ghcr.io/toeverything/affine:0.26.6
    container_name: affine_migration
    command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
      - AFFINE_INDEXER_ENABLED=false
      - AFFINE_SERVER_EXTERNAL_URL=${AFFINE_SERVER_EXTERNAL_URL}
      - MAILER_HOST=${MAILER_HOST}
      - MAILER_PORT=${MAILER_PORT}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASSWORD=${MAILER_PASSWORD}
      - MAILER_SENDER=${MAILER_SENDER}
      - MAILER_SECURE=true
    volumes:
      - affine_storage:/root/.affine/storage
      - affine_config:/root/.affine/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - affine_internal

  affine:
    image: ghcr.io/toeverything/affine:0.26.6
    container_name: affine_server
    restart: unless-stopped
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
      - AFFINE_INDEXER_ENABLED=false
      - AFFINE_SERVER_EXTERNAL_URL=${AFFINE_SERVER_EXTERNAL_URL}
      - MAILER_HOST=${MAILER_HOST}
      - MAILER_PORT=${MAILER_PORT}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASSWORD=${MAILER_PASSWORD}
      - MAILER_SENDER=${MAILER_SENDER}
      - MAILER_SECURE=true
    volumes:
      - affine_storage:/root/.affine/storage
      - affine_config:/root/.affine/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    networks:
      - affine_internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.affine.entrypoints=websecure
      - traefik.http.routers.affine.rule=Host(`affine.mystoredigital.cloud`)
      - traefik.http.routers.affine.tls.certresolver=letsencrypt
      - traefik.http.services.affine.loadbalancer.server.port=3010

  redis:
    image: redis:7-alpine
    container_name: affine_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - affine_internal

  template_proxy:
    image: nginx:alpine
    container_name: affine_template_proxy
    restart: unless-stopped
    volumes:
      - ./template-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./template-proxy/import.html:/usr/share/nginx/html/import.html:ro
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.affine-templates.entrypoints=websecure
      - traefik.http.routers.affine-templates.rule=Host(`affine.mystoredigital.cloud`) && PathPrefix(`/template-cdn`)
      - traefik.http.routers.affine-templates.priority=200
      - traefik.http.routers.affine-templates.tls.certresolver=letsencrypt
      - traefik.http.routers.affine-templates.middlewares=affine-templates-strip
      - traefik.http.middlewares.affine-templates-strip.stripprefix.prefixes=/template-cdn
      - traefik.http.services.affine-templates.loadbalancer.server.port=80

  postgres:
    image: pgvector/pgvector:pg16
    container_name: affine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - affine_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME}", "-d", "${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - affine_internal

volumes:
  affine_storage:
  affine_config:
  affine_postgres:

networks:
  affine_internal:
    driver: bridge
  dokploy-network:
    external: true
